<!DOCTYPE html>
<html>
<head>
  <title>Important CSS Properties</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(to right, #5f86c9, #6e8fd4);
      color: white;
      font-family: "Times New Roman", serif;
      padding: 40px;
    }

    h1 {
      font-size: 80px;
      font-weight: normal;
      margin-top: 0;
    }

    .color {
      color: #ff6b2d;
      font-size: 40px;
      margin-top: 20px;
    }

    .font-size {
      font-size: 150px;
      margin: 120px 0;
    }

    .font-weight {
      font-size: 40px;
      font-weight: bold;
    }

    .font-family {
      font-size: 35px;
      font-family: "Brush Script MT", cursive;
      margin-top: 20px;
    }

    .text-align {
      text-align: right;
      font-size: 40px;
      margin-top: 150px;
    }

  </style>
</head>

<body>

  <h1>Important CSS Properties</h1>

  <div class="color">Color</div>

  <div class="font-size">Font Size</div>

  <div class="font-weight">Font Weight</div>

  <div class="font-family">Font Family</div>

  <div class="text-align">Text Align</div>

</body>
</html>
